# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
      - main
  paths:
    include: 
      - AzureContainers/src/**
pool:
  vmImage: ubuntu-latest
variables:
  VmImageName: 'ubuntu-latest'
  Solution: 'src/dockerDemo.csproj'
  DOTNETVERSION: '10.x'
  imageTag: '$(Build.SourceVersion)'
stages:
- stage: Build_And_Package
  displayName: 'Build & Package Container Code'
  jobs:
    - job: Build_and_Package
      displayName: Build
      pool:
       vmImage: 'ubuntu-latest'
      steps:
        - task: UseDotNet@2
          displayName: 'Install .NET 10'
          inputs:
            version: '$(DOTNETVERSION)'
            includePreviewVersions: true        
        - task: DotNetCoreCLI@2
          displayName: 'Build Solution'
          inputs:
           command: 'build'
           projects: '$(Solution)'
        - task: UseDotNet@2
          inputs:
            packageType: sdk
            version: '$(DOTNETVERSION)'
        - powershell: npm i -g azure-functions-core-tools@4 --unsafe-perm true
          displayName: 'Install Azure functions core tools'
        - powershell: |
            # Start the function app
            $proc = Start-Process "func" "start --port 7071" -PassThru -WindowStyle Hidden
            # Wait for the endpoint to become available and download the spec
            $retries = 0
            $maxRetries = 30
            $specDownloaded = $false
            do {
                $retries++
                try {
                    Invoke-WebRequest -Uri "http://localhost:7071/api/swagger.json" -OutFile "swagger.json" -UseBasicParsing -TimeoutSec 5
                    Write-Host "Successfully downloaded swagger.json"
                    $specDownloaded = $true
                    break
                }
                catch {
                    Write-Host "Attempt $retries/$maxRetries failed. Waiting 2 seconds..."
                    Start-Sleep -Seconds 2
                }
            } while ($retries -lt $maxRetries -and -not $specDownloaded)

            if ($proc -and -not $proc.HasExited) {
                Stop-Process -Id $proc.Id -Force
            }

            if (-not $specDownloaded) {
                throw "Failed to download swagger.json after $maxRetries attempts."
            }

            New-Item -ItemType Directory -Force -Path $(Build.ArtifactStagingDirectory)/api-spec -ErrorAction SilentlyContinue | Out-Null
            Copy-Item "swagger.json" -Destination "$(Build.ArtifactStagingDirectory)/api-spec/swagger.json" -Force
          displayName: 'Generate and stage Swagger spec'
          
        - task: CopyFiles@2
          displayName: 'Copy Bicep files'
          inputs:
            sourceFolder: '$(System.DefaultWorkingDirectory)'
            contents: '**/Deployment/Bicep/**'
            TargetFolder: '$(Build.ArtifactStagingDirectory)'
        - task: CopyFiles@2
          displayName: 'Copy Source Files'
          inputs:
           sourceFolder: '$(System.DefaultWorkingDirectory)'
           contents: '**/src/**'
           TargetFolder: '$(Build.ArtifactStagingDirectory)'
        - task: PublishBuildArtifacts@1
          displayName: 'Pubishing Artifacts'
          inputs:
           PathtoPublish: '$(Build.ArtifactStagingDirectory)'
           ArtifactName: 'drop'
           publishLocation: Container
- stage: Deploy_To_Dev
  displayName: 'Deploy_To_Dev'
  dependsOn: Build_And_Package
  jobs:
    - deployment: ProvisionAzureResources
      displayName: 'Provision Azure Resources'
      environment: 'DEV'      
      variables:
        AzureSubscription : 'constructixDevSvcConn'
        DevResourceGroup : 'rg-ems-elector-ae-dev'
        ContainerRepository : 'crelectordevae'        
        ImageRepositoryName : 'electorservicesrepository'
        DeployEnv : 'dev'
      strategy:
       runOnce:
         deploy:
          steps:
            - task: PowerShell@2
              inputs:
                targetType: inline
                script: |
                  Write-Host "CurrentBuild Id: $(Build.BuildNumber)"
            - task: DownloadPipelineArtifact@2
              displayName: 'Downloading build artifacts'
              inputs:
               buildType: current
               artifactName: 'drop'
               targetPath: '$(Pipeline.Workspace)'
            - task: PowerShell@2
              displayName: 'Debug variables'
              inputs:
                targetType: inline
                script: |
                  Write-Host "DevResourceGroup=$(DevResourceGroup)"
                  Write-Host "ContainerRepository=$(ContainerRepository)"
                  Write-Host "DeployEnv=$(DeployEnv)"
                  Write-Host "ImageRepositoryName=$(ImageRepositoryName)"
            - task: AzureCLI@2
              displayName: 'Provising Azure Resources'
              inputs:
                azureSubscription: 'constructixDevSvcConn'
                scriptType: pscore
                scriptLocation: scriptPath
                scriptPath: '$(Pipeline.Workspace)/drop/Deployment/Bicep/Deploy.ps1'
                workingDirectory: '$(Pipeline.Workspace)/drop/Deployment/Bicep'
                arguments: -ResourceGroup $(DevResourceGroup) -ContainerRepository $(ContainerRepository) -DeploymentEnv $(DeployEnv) -RepositoryName $(ImageRepositoryName)
                addSpnToEnvironment: true
                #failOnStandardError: true # Turnoff the moment.
            - task: AzureCLI@2
              displayName: 'Build and Push Image to Container Registry'
              inputs:
                azureSubscription: 'constructixDevSvcConn'
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  az acr login --name 'crelectordevae'
                  IMAGE='$(ContainerRepository).azurecr.io/$(ImageRepositoryName):$(imageTag)'
                  docker build \
                    --no-cache \
                    -f $(Pipeline.Workspace)/drop/src/Dockerfile \
                      -t $IMAGE \
                      $(Pipeline.Workspace)/drop/src
                    docker push $IMAGE
            - task: AzureCLI@2
              displayName: 'Deploy Container App with Latest Image'
              inputs:
                azureSubscription: 'constructixDevSvcConn'
                scriptType: pscore
                scriptLocation: scriptPath
                scriptPath: '$(Pipeline.Workspace)/drop/Deployment/Bicep/Container/CreateContainer-deploy-$(DeployEnv).ps1'
                workingDirectory: '$(Pipeline.Workspace)/drop/Deployment/Bicep/Container'
                arguments: -ResourceGroup $(DevResourceGroup) -ContainerRegistry $(ContainerRepository) -RepositoryName $(ImageRepositoryName) -Environment $(DeployEnv) 
