name: Build and Deploy To Dev
on:
  push:
    branches:
      - main
    paths:
      - 'AzureContainers/src/**'
      - '**'
    # this statement enables manual triggers.  
    workflow_dispatch:
env:
  RESOURCE_GROUP                       : 'rg-constructix-dev-ae-02'
  PROJECT                              : 'src/docker.slnx'
  IMAGE_REPOSITORY                     : 'constructixonlineservicesfunctions'
  CONTAINER_REGISTRY                   : 'constructixdockerregistry.azurecr.io'
  CONTAINER_REGISTRY_NAME              : 'constructixdockerregistry'
  CONTAINER_APP_NAME                   : 'constructixonlineservices'
  CONTAINER_APP_ENVIRONMENT            : 'funcappenvv1' 
  
jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          include-prerelease: true

      - name: Build Solution
        run: dotnet build ${{ env.PROJECT }}

      # === Debug: Show folder structure ===
      - name: Debug - List repository structure
        run: |
          echo "=== Repository Root ==="
          ls -la
          echo "=== Searching for src ==="
          find . -type d -name "src" | head -10
          echo "=== Searching for Bicep ==="
          find . -type d -name "Bicep" | head -10

      # === Copy Bicep ===
      - name: Copy Bicep Files
        run: |
          mkdir -p artifacts/Bicep/UserAssigned
          cp -r **/Bicep/** artifacts/Bicep/ 2>/dev/null || true

      # === Copy AzureFunctionsInContainers (Improved) ===
      - name: Copy AzureFunctionsInContainers files
        run: |
          mkdir -p artifacts/AzureFunctionsInContainers
          rsync -av \
          --exclude='bin/' \
          --exclude='obj/' \
          --exclude='.git/' \
          --exclude='*.user' \
          --exclude='*.suo' \
          --exclude='*src/' \
          src/ artifacts/AzureFunctionsInContainers/
      # === Final Debug: Check what was copied ===
      - name: Debug - Show artifacts content
        run: |
          echo "=== Final artifacts folder structure ==="
          ls -R artifacts/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drop
          path: artifacts/
          retention-days: 7
  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    environment: DEV
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: drop
          path: ./artifacts

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # === 1. Deploy Infrastructure (including ACR) ===
      - name: Deploy Bicep Infrastructure
        run: |
          cd ./artifacts/Bicep
          ./Deploy.ps1
        shell: pwsh

      # === 2. Build and Push Docker Image ===
      - name: Build and Push to ACR
        run: |
          az acr login --name ${{ env.CONTAINER_REGISTRY_NAME }}
          
          # Use short SHA for image tag and revision suffix
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${SHORT_SHA}"
          FULL_IMAGE="${{ env.CONTAINER_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_REPOSITORY }}:${IMAGE_TAG}"
          
          echo "Building image: $FULL_IMAGE"
          
          docker build \
            --no-cache \
            -f ./artifacts/AzureFunctionsInContainers/Dockerfile \
            -t $FULL_IMAGE \
            ./artifacts/AzureFunctionsInContainers
          
          docker push $FULL_IMAGE
          
          echo "IMAGE=$FULL_IMAGE" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
        env:
          DOCKER_BUILDKIT: 1

      # === 3. Verify Image was pushed ===
      - name: Verify Image in ACR
        run: |
          echo "Checking repository tags..."
          az acr repository show-tags \
            --name ${{ env.CONTAINER_REGISTRY_NAME }} \
            --repository ${{ env.IMAGE_REPOSITORY }} \
            --output table

      # === 4. Update Container App ===
      - name: Update Container App
        run: |
          echo "Updating Container App with image: ${{ env.IMAGE }}"
          
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }} \
            --revision-suffix ${{ env.SHORT_SHA }} \   # ← Fixed here
            --min-replicas 1 \
            --max-replicas 10
          
          echo "Container App updated successfully with new revision."       
