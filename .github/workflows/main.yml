name: Build and Deploy To Dev
on:
  push:
    branches:
      - main
    paths:
      - 'AzureContainers/src/**'
      - '**'
    # this statement enables manual triggers.  
    workflow_dispatch:
env:
  RESOURCE_GROUP: 'rg-constructix-dev-ae-02'
  PROJECT: 'src/docker.slnx'
  IMAGE_REPOSITORY: 'constructixonlineservicesfunctions'
  CONTAINER_REGISTRY: 'constructixdockerregistry.azurecr.io'
  CONTAINER_REGISTRY_NAME: 'constructixdockerregistry'
  CONTAINER_APP_NAME        : 'constructixonlineservices'
  CONTAINER_APP_ENVIRONMENT  : 'funcappenvv1' 
  
jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          include-prerelease: true
      - name: Build Solution
        run: dotnet build ${{ env.PROJECT }}
      - name: Copy Bicep Files
        run: |
          mkdir -p artifacts/Bicep
          cp -r **/Bicep/** artifacts/Bicep/ 2>/dev/null || true     
      - name: Copy AzureFunctionsInContainers files
        run: |
          mkdir -p artifacts/AzureFunctionsInContainers
          cp -r **/AzureFunctionsInContainers/** artifacts/AzureFunctionsInContainers/ 2>/dev/null || true
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drop
          path: artifacts/
          retention-days: 7
  deploy:
    name: Deploy To Developement
    runs-on: ubuntu-latest
    needs: build
    environment: DEV
    steps:
      - name : Checkout Code
        uses : actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: drop
          path: ./artifacts
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Provision Azure Resources (Bicep)
        run: |
          cd ./Bicep
          ./Deploy.ps1
        shell: pwsh
        working-directory: ./artifacts
      - name: Build and Push Docker Image to ACR
        run: |
          az acr login --name ${{ env.CONTAINER_REGISTRY_NAME }}
          IMAGE="${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}"
          docker build \
            --no-cache \
            -f ./artifacts/AzureFunctionsInContainers/docker/Dockerfile \
            -t $IMAGE \
            ./artifacts/AzureFunctionsInContainers/docker
          docker push $IMAGE          
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Get Latest Image Tag
        run: |
          LATEST_TAG=$(az acr repository show-tags \
            --name ${{ env.CONTAINER_REGISTRY_NAME }} \
            --repository ${{ env.IMAGE_REPOSITORY }} \
            --orderby time_desc \
            --top 1 \
            --output tsv)          
          echo "Latest Tag: $LATEST_TAG"
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.CONTAINER_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_REPOSITORY }}:${{ env.LATEST_TAG }} \
            --ingress external \
            --target-port 80
