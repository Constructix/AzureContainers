name: Build and Deploy To Dev

on:
  push:
    branches:
      - main
    paths:
      - 'AzureContainers/src/**'
      - '**'
    # this statement enables manual triggers.  
    workflow_dispatch:
env:
  RESOURCE_GROUP: 'rg-constructix-dev-ae-02'
  PROJECT: 'src/docker.slnx'
  IMAGE_REPOSITORY: 'constructixonlineservicesfunctions'
  CONTAINER_REGISTRY: 'constructixdockerregistry.azurecr.io'
  CONTAINER_REGISTRY_NAME: 'constructixdockerregistry'
  CONTAINER_APP_NAME        : 'constructixonlineservices'
  CONTAINER_APP_ENVIRONMENT  : 'funcappenvv1' 
  
jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          include-prerelease: true
      - name: Build Solution
        run: dotnet build ${{ env.PROJECT }}
      - name: Copy Bicep Files
        run: |
          mkdir -p artifacts/Bicep/UserAssigned
          cp -r **/Bicep/** artifacts/Bicep/ 2>/dev/null || true
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drop
          path: artifacts/
          retention-days: 7
  deploy:
    name: Deploy To Devlopement
    runs-on: ubuntu-latest
    needs: build
    environment: DEV
    steps:
      - name : Checkout Code
        uses : actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifacts@v4
        with:
          name: drop
          path: ./artifacts
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Provision Azure Resources (Bicep)
        run: |
          cd ./artifacts/Bicep/Deploy.ps1
        shell: pwsh
    
    
